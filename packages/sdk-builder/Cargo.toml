[package]
name = "ffmpeg-sdk-builder"
version = "0.1.0"
edition = "2021"
authors = ["DarkSky <darksky2048@gmail.com>"]
description = "Build support for ffmpeg-pipeline static SDKs"
license = "AGPL-3.0-only"
repository = "https://github.com/darkskygit/ffmpeg-pipeline"
publish = false

[features]
default = []
build-from-source = ["dep:gix"]

[dependencies]
flate2 = "1"
gix = { version = "0.72.1", optional = true, features = [
    "worktree-mutation",
    "blocking-network-client",
    "blocking-http-transport-reqwest-rust-tls",
] }
reqwest = { version = "0.12", default-features = false, features = [
    "blocking",
    "rustls-tls",
] }
sha2 = "0.10"
tar = "0.4"
tempfile = "3"
thiserror = "1.0.69"

[[bin]]
name = "build-ffmpeg-sdk"
path = "src/bin/build-ffmpeg-sdk.rs"
required-features = ["build-from-source"]
