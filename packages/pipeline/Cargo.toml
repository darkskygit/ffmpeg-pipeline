[package]
name = "ffmpeg-pipeline"
version = "0.1.0"
edition = "2021"
authors = ["DarkSky <darksky2048@gmail.com>"]
license = "AGPL-3.0-only"

[features]
default = []
build-from-source = ["ffmpeg-next/build"]

[dependencies]
ffmpeg-next = { version = "7.1.0", default-features = false, features = [
  "codec",
  "filter",
  "format",
  "software-resampling",
  "software-scaling",
  "static",
] }
thiserror = "1.0.63"

log = { workspace = true }
serde = { workspace = true }

[dev-dependencies]
assert-json-diff = "2.0.2"
image = { workspace = true }
rayon = "1.10.0"
serde_json = "1.0.120"
