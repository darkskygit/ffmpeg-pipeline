[package]
name = "ffmpeg-pipeline"
version = "0.2.0"
edition = "2021"
rust-version = "1.77"
authors = ["DarkSky <darksky2048@gmail.com>"]
description = "Composable FFmpeg decoding, encoding, remuxing, and media I/O for Rust"
license = "AGPL-3.0-only"
readme = "../../README.md"
repository = "https://github.com/darkskygit/ffmpeg-pipeline"
homepage = "https://github.com/darkskygit/ffmpeg-pipeline"
documentation = "https://docs.rs/ffmpeg-pipeline"
keywords = ["ffmpeg", "audio", "video", "codec", "multimedia"]
categories = ["api-bindings", "multimedia::audio", "multimedia::video"]

[features]
default = []
build-from-source = ["ffmpeg-next/build"]

[dependencies]
ffmpeg-next = { version = "7.1.0", default-features = false, features = [
  "codec",
  "filter",
  "format",
  "software-resampling",
  "software-scaling",
  "static",
] }
thiserror = "1.0.63"

log = { workspace = true }
serde = { workspace = true }

[dev-dependencies]
assert-json-diff = "2.0.2"
image = { workspace = true }
rav1e = { version = "0.8.1", default-features = false, features = ["threading"] }
rayon = "1.10.0"
serde_json = "1.0.120"
